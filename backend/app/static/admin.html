<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PawGo Admin — pet policy editor</title>
<style>
  :root {
    --bg: #f7f7f8;
    --card: #ffffff;
    --border: #d9d9de;
    --text: #202124;
    --muted: #6b6b70;
    --primary: #2f6bff;
    --primary-hover: #1a52e0;
    --danger: #d0342c;
    --ok: #1b7a3e;
    --disabled-bg: #ececef;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    background: var(--text);
    color: #fff;
    padding: 14px 20px;
  }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; }
  header .who { float: right; font-size: 13px; color: #b6b6bd; }
  main { max-width: 900px; margin: 24px auto; padding: 0 16px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .card h2 { margin: 0 0 14px; font-size: 15px; }
  .row {
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 8px 14px;
    align-items: center;
    margin-bottom: 10px;
  }
  label { color: var(--muted); font-size: 13px; }
  input, select, textarea, button {
    font: inherit;
    color: inherit;
  }
  input, select, textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #fff;
  }
  textarea { resize: vertical; min-height: 72px; }
  input[disabled], select[disabled], textarea[disabled] {
    background: var(--disabled-bg);
    color: var(--muted);
  }
  button {
    padding: 8px 14px;
    border: 0;
    border-radius: 6px;
    background: var(--primary);
    color: #fff;
    cursor: pointer;
  }
  button:hover { background: var(--primary-hover); }
  button.secondary {
    background: #fff;
    color: var(--text);
    border: 1px solid var(--border);
  }
  button:disabled { opacity: .55; cursor: not-allowed; }
  .msg { padding: 8px 10px; border-radius: 6px; margin-top: 12px; font-size: 13px; }
  .msg.err { background: #fdecec; color: var(--danger); border: 1px solid #f5c8c5; }
  .msg.ok  { background: #eaf6ee; color: var(--ok);     border: 1px solid #c6e3d1; }
  ul.results { list-style: none; padding: 0; margin: 12px 0 0; }
  ul.results li {
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 6px;
    cursor: pointer;
    background: #fff;
  }
  ul.results li:hover { background: #f0f4ff; }
  ul.results li .id { color: var(--muted); margin-right: 8px; font-size: 12px; }
  ul.results li .cat { color: var(--muted); font-size: 12px; margin-left: 8px; }
  ul.results li .badge-closed {
    background: var(--danger); color: #fff; padding: 2px 6px;
    border-radius: 4px; font-size: 11px; margin-left: 8px; font-weight: 600;
  }
  .subsection { margin: 4px 0 8px; }
  .subsection h3 {
    margin: 0 0 12px; font-size: 14px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  #editCard h3 {
    margin: 0 0 12px; font-size: 14px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .status-visible { color: var(--ok); font-weight: 600; }
  .status-hidden  { color: var(--danger); font-weight: 600; }
  .note {
    font-size: 12px; color: var(--muted); margin-top: 4px;
  }
  .actions { margin-top: 14px; display: flex; gap: 8px; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<header>
  <h1>PawGo Admin — pet policy editor</h1>
  <span class="who" id="who"></span>
</header>

<main>
  <!-- LOGIN -->
  <section id="loginCard" class="card">
    <h2>로그인</h2>
    <div class="row">
      <label for="loginEmail">이메일</label>
      <input id="loginEmail" type="email" value="shinis0207@gmail.com" autocomplete="username" />
    </div>
    <div class="row">
      <label for="loginPw">비밀번호</label>
      <input id="loginPw" type="password" autocomplete="current-password" />
    </div>
    <div class="actions">
      <button id="loginBtn">로그인</button>
    </div>
    <div id="loginMsg"></div>
  </section>

  <!-- SEARCH -->
  <section id="searchCard" class="card hidden">
    <h2>장소 검색</h2>
    <p class="note">
      관리자 전용 조회(/admin/places). 폐업(숨김) 장소도 결과에 포함됩니다.
      이름은 공백 무시 부분일치. 비워두면 최근 이름순으로 나열.
    </p>
    <div class="row">
      <label for="searchQ">이름</label>
      <input id="searchQ" type="text" placeholder="예: 커피 리브레" />
    </div>
    <div class="actions">
      <button id="searchBtn">검색</button>
      <button class="secondary" id="logoutBtn">로그아웃</button>
    </div>
    <ul class="results" id="results"></ul>
    <div id="searchMsg"></div>
  </section>

  <!-- EDIT -->
  <section id="editCard" class="card hidden">
    <h2>편집 — <span id="placeName"></span> <span class="note" id="placeMeta"></span></h2>

    <!-- 장소 기본정보 -->
    <div class="subsection">
      <h3>장소 기본정보</h3>
      <div class="row">
        <label for="b_name">이름</label>
        <input id="b_name" type="text" maxlength="200" />
      </div>
      <div class="row">
        <label for="b_phone">전화</label>
        <input id="b_phone" type="text" maxlength="20" placeholder="비우면 값 지우기" />
      </div>
      <div class="row">
        <label>현재 상태</label>
        <span id="b_status_label"></span>
      </div>
      <div class="actions">
        <button id="basicSaveBtn">기본정보 저장</button>
        <button class="secondary" id="visibilityToggleBtn"></button>
      </div>
      <div id="basicMsg"></div>
    </div>

    <hr />

    <h3>동반 정책</h3>

    <div class="row">
      <label>verification_status</label>
      <input id="v_verification" disabled />
    </div>
    <p class="note">verification_status는 trust engine이 자동으로 계산합니다. 편집 불가.</p>

    <hr />

    <div class="row">
      <label for="v_pet_allowed_status">pet_allowed_status</label>
      <select id="v_pet_allowed_status">
        <option value="">미설정</option>
        <option value="allowed">allowed</option>
        <option value="limited">limited</option>
        <option value="not_allowed">not_allowed</option>
        <option value="unknown">unknown</option>
      </select>
    </div>

    <div class="row">
      <label for="v_indoor_allowed">indoor_allowed</label>
      <select id="v_indoor_allowed" class="tri">
        <option value="">미설정</option>
        <option value="true">true</option>
        <option value="false">false</option>
      </select>
    </div>

    <div class="row">
      <label for="v_outdoor_allowed">outdoor_allowed</label>
      <select id="v_outdoor_allowed" class="tri">
        <option value="">미설정</option>
        <option value="true">true</option>
        <option value="false">false</option>
      </select>
    </div>

    <div class="row">
      <label for="v_dog_allowed">dog_allowed</label>
      <select id="v_dog_allowed" class="tri">
        <option value="">미설정</option>
        <option value="true">true</option>
        <option value="false">false</option>
      </select>
    </div>

    <div class="row">
      <label for="v_cat_allowed">cat_allowed</label>
      <select id="v_cat_allowed" class="tri">
        <option value="">미설정</option>
        <option value="true">true</option>
        <option value="false">false</option>
      </select>
    </div>

    <div class="row">
      <label for="v_max_weight_kg">max_weight_kg</label>
      <input id="v_max_weight_kg" type="number" step="0.1" min="0" placeholder="비우면 미설정" />
    </div>

    <div class="row">
      <label for="v_leash_required">leash_required</label>
      <select id="v_leash_required" class="tri">
        <option value="">미설정</option>
        <option value="true">true</option>
        <option value="false">false</option>
      </select>
    </div>

    <div class="row">
      <label for="v_carrier_required">carrier_required</label>
      <select id="v_carrier_required" class="tri">
        <option value="">미설정</option>
        <option value="true">true</option>
        <option value="false">false</option>
      </select>
    </div>

    <div class="row">
      <label for="v_vaccination_required">vaccination_required</label>
      <select id="v_vaccination_required" class="tri">
        <option value="">미설정</option>
        <option value="true">true</option>
        <option value="false">false</option>
      </select>
    </div>

    <div class="row">
      <label for="v_notes">notes</label>
      <textarea id="v_notes" placeholder="비우면 미설정"></textarea>
    </div>

    <div class="row">
      <label for="v_policy_source">policy_source</label>
      <select id="v_policy_source">
        <option value="">미설정</option>
        <option value="mfds">mfds</option>
        <option value="owner">owner</option>
        <option value="admin">admin</option>
        <option value="user_report">user_report</option>
        <option value="external">external</option>
        <option value="unknown">unknown</option>
      </select>
    </div>

    <div class="row">
      <label for="v_confidence_score">confidence_score</label>
      <input id="v_confidence_score" type="number" step="0.01" min="0" max="1" placeholder="0.0 ~ 1.0, 비우면 미설정" />
    </div>

    <div class="actions">
      <button id="saveBtn">저장</button>
      <button class="secondary" id="reloadBtn">현재값 다시 불러오기</button>
    </div>
    <div id="editMsg"></div>
  </section>
</main>

<script>
"use strict";

const API = "/api/v1";

// --- Editable fields (must mirror PetPolicyPatchRequest / _ALLOWED_POLICY_FIELDS) ---
const TRI_FIELDS = [
  "indoor_allowed", "outdoor_allowed", "dog_allowed", "cat_allowed",
  "leash_required", "carrier_required", "vaccination_required",
];
const ENUM_FIELDS = ["pet_allowed_status", "policy_source"];
const NUMBER_FIELDS = ["max_weight_kg", "confidence_score"];
const TEXT_FIELDS = ["notes"];
const ALL_EDITABLE = [
  ...ENUM_FIELDS, ...TRI_FIELDS, ...NUMBER_FIELDS, ...TEXT_FIELDS,
];

// --- State ---
let token = localStorage.getItem("pawgo_admin_token") || "";
let currentPlace = null;   // { id, name, category }
let loadedPolicy = null;   // baseline for diff on save

// --- DOM helpers ---
const $ = (id) => document.getElementById(id);
function show(el) { el.classList.remove("hidden"); }
function hide(el) { el.classList.add("hidden"); }
function setMsg(el, text, kind) {
  el.innerHTML = text ? `<div class="msg ${kind}">${escapeHtml(text)}</div>` : "";
}
function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g,
    c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

async function api(path, opts = {}) {
  const headers = Object.assign(
    { "Content-Type": "application/json" },
    opts.headers || {},
  );
  if (token) headers["Authorization"] = "Bearer " + token;
  const res = await fetch(API + path, Object.assign({}, opts, { headers }));
  let body = null;
  try { body = await res.json(); } catch { /* non-JSON response ok */ }
  return { ok: res.ok, status: res.status, body };
}

// --- Auth ---
async function login() {
  const email = $("loginEmail").value.trim();
  const password = $("loginPw").value;
  setMsg($("loginMsg"), "", "");
  const r = await api("/auth/login", {
    method: "POST",
    body: JSON.stringify({ email, password }),
  });
  if (!r.ok) {
    setMsg($("loginMsg"),
      "로그인 실패 (" + r.status + "): " + JSON.stringify(r.body?.detail ?? r.body ?? ""),
      "err");
    return;
  }
  if (r.body?.user?.role !== "admin") {
    setMsg($("loginMsg"), "이 계정은 admin 권한이 없습니다.", "err");
    return;
  }
  token = r.body.access_token;
  localStorage.setItem("pawgo_admin_token", token);
  enterAdmin(r.body.user);
}

function enterAdmin(user) {
  $("who").textContent = (user?.email || "") + " · admin";
  hide($("loginCard"));
  show($("searchCard"));
}

function logout() {
  token = "";
  localStorage.removeItem("pawgo_admin_token");
  location.reload();
}

async function bootstrapFromToken() {
  if (!token) return;
  const r = await api("/auth/me");
  if (r.ok && r.body?.role === "admin") {
    enterAdmin(r.body);
  } else {
    logout();
  }
}

// --- Search (admin-only endpoint, includes HIDDEN rows) ---
async function search() {
  const q = $("searchQ").value.trim();
  setMsg($("searchMsg"), "검색 중…", "ok");
  $("results").innerHTML = "";
  const params = new URLSearchParams({ page: "1", size: "50" });
  if (q) params.set("q", q);
  const r = await api("/admin/places?" + params.toString());
  if (!r.ok) {
    setMsg($("searchMsg"),
      "검색 실패 (" + r.status + "): " + JSON.stringify(r.body?.detail ?? r.body ?? ""),
      "err");
    return;
  }
  const items = r.body?.items || [];
  setMsg($("searchMsg"), items.length ? "" : "결과 없음", items.length ? "ok" : "err");
  const ul = $("results");
  ul.innerHTML = "";
  items.forEach((p) => {
    const li = document.createElement("li");
    const badge = p.visibility_status === "hidden"
      ? ' <span class="badge-closed">폐업</span>' : '';
    li.innerHTML =
      '<span class="id">#' + p.id + '</span>' +
      '<strong>' + escapeHtml(p.name) + '</strong>' +
      '<span class="cat">' + escapeHtml(p.category) + '</span>' +
      badge;
    li.onclick = () => selectPlace(p);
    ul.appendChild(li);
  });
}

// --- Selection + load (both basic info + policy) ---
// The admin search response IS the authoritative PlaceResponse — no need
// to re-GET /places/{id}. That also avoids the public GET's is_active
// filter (harmless here — search already enforces it — but conceptually
// cleaner: admin flow never leaves the admin API surface).
async function selectPlace(p) {
  currentPlace = p;
  loadBasic(p);
  loadPolicy(p);
}

// Baseline for basic-info diff on save. Distinct from loadedPolicy so
// the policy save button and basic-info save button don't step on each
// other.
let loadedBasic = null;

function loadBasic(p) {
  loadedBasic = {
    name: p.name ?? "",
    phone: p.phone ?? "",
    visibility_status: p.visibility_status,
  };
  $("placeName").textContent = p.name;
  $("placeMeta").textContent = " (#" + p.id + ", " + p.category + ")";
  $("b_name").value = loadedBasic.name;
  $("b_phone").value = loadedBasic.phone;
  renderVisibility(loadedBasic.visibility_status);
  setMsg($("basicMsg"), "", "");
  show($("editCard"));
}

function renderVisibility(status) {
  const label = $("b_status_label");
  const btn = $("visibilityToggleBtn");
  if (status === "hidden") {
    label.innerHTML = '<span class="status-hidden">폐업(숨김)</span>';
    btn.textContent = "영업 중으로 복구";
  } else {
    label.innerHTML = '<span class="status-visible">영업 중</span>';
    btn.textContent = "폐업 처리";
  }
}

function loadPolicy(placeFromSearch) {
  // Prefer the pet_policy already carried by the search response — it's
  // the same PlaceResponse shape /places/{id} would return. Fall back to
  // an empty object if the row somehow has no policy (shouldn't happen
  // per the create_place_with_default_policy invariant).
  const policy = placeFromSearch?.pet_policy || {};
  loadedPolicy = policy;
  $("v_verification").value = policy.verification_status ?? "";
  ENUM_FIELDS.forEach((f) => { $("v_" + f).value = policy[f] ?? ""; });
  TRI_FIELDS.forEach((f) => {
    const v = policy[f];
    $("v_" + f).value = v === true ? "true" : v === false ? "false" : "";
  });
  NUMBER_FIELDS.forEach((f) => {
    $("v_" + f).value = policy[f] === null || policy[f] === undefined
      ? "" : String(policy[f]);
  });
  TEXT_FIELDS.forEach((f) => { $("v_" + f).value = policy[f] ?? ""; });
  setMsg($("editMsg"), "", "");
}

// Called by the policy section's "reload" button — re-fetches from the
// admin list endpoint with a targeted q so we don't drift from what the
// search view showed.
async function reloadCurrentPlace() {
  if (!currentPlace) return;
  setMsg($("editMsg"), "불러오는 중…", "ok");
  // Ask for the current place by exact name — cheap targeted fetch.
  const params = new URLSearchParams({
    q: currentPlace.name, page: "1", size: "20",
  });
  const r = await api("/admin/places?" + params.toString());
  if (!r.ok) {
    setMsg($("editMsg"),
      "장소 조회 실패 (" + r.status + "): " + JSON.stringify(r.body?.detail ?? r.body ?? ""),
      "err");
    return;
  }
  const items = r.body?.items || [];
  const fresh = items.find((p) => p.id === currentPlace.id);
  if (!fresh) {
    setMsg($("editMsg"), "장소를 찾을 수 없습니다 (이름이 바뀌었을 수 있음).", "err");
    return;
  }
  currentPlace = fresh;
  loadBasic(fresh);
  loadPolicy(fresh);
}

// --- Value readers (form value → JSON value) ---
function readTri(id) {
  const v = $(id).value;
  if (v === "true") return true;
  if (v === "false") return false;
  return null;
}
function readEnum(id) {
  const v = $(id).value;
  return v === "" ? null : v;
}
function readNumber(id) {
  const v = $(id).value.trim();
  if (v === "") return null;
  const n = Number(v);
  return Number.isFinite(n) ? n : null;
}
function readText(id) {
  const v = $(id).value;
  return v === "" ? null : v;
}

// --- Save (diff → PATCH) ---
async function save() {
  if (!currentPlace || !loadedPolicy) return;
  const current = {};
  ENUM_FIELDS.forEach((f) => { current[f] = readEnum("v_" + f); });
  TRI_FIELDS.forEach((f) => { current[f] = readTri("v_" + f); });
  NUMBER_FIELDS.forEach((f) => { current[f] = readNumber("v_" + f); });
  TEXT_FIELDS.forEach((f) => { current[f] = readText("v_" + f); });

  const patch = {};
  ALL_EDITABLE.forEach((f) => {
    const before = loadedPolicy[f] ?? null;
    const after = current[f];
    if (before !== after) patch[f] = after;
  });

  if (Object.keys(patch).length === 0) {
    setMsg($("editMsg"), "변경된 필드 없음.", "ok");
    return;
  }

  setMsg($("editMsg"), "저장 중…", "ok");
  const r = await api("/admin/places/" + currentPlace.id + "/policy", {
    method: "PATCH",
    body: JSON.stringify(patch),
  });
  if (!r.ok) {
    setMsg($("editMsg"),
      "저장 실패 (" + r.status + "): " + JSON.stringify(r.body?.detail ?? r.body ?? ""),
      "err");
    return;
  }
  // Response is the fresh PetPolicyResponse — use it as new baseline.
  loadedPolicy = r.body;
  // Re-render fields from the authoritative response so the UI reflects
  // trust-engine-computed verification_status changes too.
  $("v_verification").value = loadedPolicy.verification_status ?? "";
  ENUM_FIELDS.forEach((f) => { $("v_" + f).value = loadedPolicy[f] ?? ""; });
  TRI_FIELDS.forEach((f) => {
    const v = loadedPolicy[f];
    $("v_" + f).value = v === true ? "true" : v === false ? "false" : "";
  });
  NUMBER_FIELDS.forEach((f) => {
    $("v_" + f).value = loadedPolicy[f] === null || loadedPolicy[f] === undefined
      ? "" : String(loadedPolicy[f]);
  });
  TEXT_FIELDS.forEach((f) => { $("v_" + f).value = loadedPolicy[f] ?? ""; });
  setMsg($("editMsg"),
    "저장됨 (변경 " + Object.keys(patch).length + "개 필드).",
    "ok");
}

// --- Basic-info save (name / phone) — diff-only PATCH ---
async function saveBasic() {
  if (!currentPlace || !loadedBasic) return;
  const nameNow = $("b_name").value.trim();
  const phoneRaw = $("b_phone").value.trim();
  if (!nameNow) {
    setMsg($("basicMsg"), "이름은 비울 수 없습니다.", "err");
    return;
  }

  const patch = {};
  if (nameNow !== (loadedBasic.name ?? "")) patch.name = nameNow;
  // Phone: blank input -> null (clear). Both sides normalized: baseline
  // null becomes "" via loadBasic, so an untouched blank input diffs to
  // no change.
  const phoneAfter = phoneRaw === "" ? null : phoneRaw;
  const phoneBefore = loadedBasic.phone === "" ? null : loadedBasic.phone;
  if (phoneAfter !== phoneBefore) patch.phone = phoneAfter;

  if (Object.keys(patch).length === 0) {
    setMsg($("basicMsg"), "변경된 필드 없음.", "ok");
    return;
  }

  setMsg($("basicMsg"), "저장 중…", "ok");
  const r = await api("/admin/places/" + currentPlace.id, {
    method: "PATCH",
    body: JSON.stringify(patch),
  });
  if (!r.ok) {
    setMsg($("basicMsg"),
      "저장 실패 (" + r.status + "): " + JSON.stringify(r.body?.detail ?? r.body ?? ""),
      "err");
    return;
  }
  // Response is the fresh PlaceResponse — use it to reset baseline + form.
  currentPlace = r.body;
  loadBasic(r.body);
  setMsg($("basicMsg"),
    "저장됨 (변경 " + Object.keys(patch).length + "개 필드).",
    "ok");
}

// --- Visibility toggle — confirm on hide, silent on restore ---
async function toggleVisibility() {
  if (!currentPlace || !loadedBasic) return;
  const nextStatus =
    loadedBasic.visibility_status === "hidden" ? "visible" : "hidden";
  if (nextStatus === "hidden") {
    if (!confirm("폐업 처리하면 목록에서 숨겨집니다. 진행할까요?")) return;
  }
  setMsg($("basicMsg"), "상태 변경 중…", "ok");
  const r = await api("/admin/places/" + currentPlace.id, {
    method: "PATCH",
    body: JSON.stringify({ visibility_status: nextStatus }),
  });
  if (!r.ok) {
    setMsg($("basicMsg"),
      "상태 변경 실패 (" + r.status + "): " + JSON.stringify(r.body?.detail ?? r.body ?? ""),
      "err");
    return;
  }
  currentPlace = r.body;
  loadBasic(r.body);
  setMsg(
    $("basicMsg"),
    nextStatus === "hidden" ? "폐업 처리됨." : "영업 중으로 복구됨.",
    "ok",
  );
}

// --- Wire up ---
$("loginBtn").addEventListener("click", login);
$("logoutBtn").addEventListener("click", logout);
$("searchBtn").addEventListener("click", search);
$("searchQ").addEventListener("keydown",
  (e) => { if (e.key === "Enter") search(); });
$("basicSaveBtn").addEventListener("click", saveBasic);
$("visibilityToggleBtn").addEventListener("click", toggleVisibility);
$("saveBtn").addEventListener("click", save);
$("reloadBtn").addEventListener("click", reloadCurrentPlace);

bootstrapFromToken();
</script>
</body>
</html>
