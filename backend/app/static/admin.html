<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PawGo Admin — pet policy editor</title>
<style>
  :root {
    --bg: #f7f7f8;
    --card: #ffffff;
    --border: #d9d9de;
    --text: #202124;
    --muted: #6b6b70;
    --primary: #2f6bff;
    --primary-hover: #1a52e0;
    --danger: #d0342c;
    --ok: #1b7a3e;
    --disabled-bg: #ececef;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    background: var(--text);
    color: #fff;
    padding: 14px 20px;
  }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; }
  header .who { float: right; font-size: 13px; color: #b6b6bd; }
  main { max-width: 900px; margin: 24px auto; padding: 0 16px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .card h2 { margin: 0 0 14px; font-size: 15px; }
  .row {
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 8px 14px;
    align-items: center;
    margin-bottom: 10px;
  }
  label { color: var(--muted); font-size: 13px; }
  input, select, textarea, button {
    font: inherit;
    color: inherit;
  }
  input, select, textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #fff;
  }
  textarea { resize: vertical; min-height: 72px; }
  input[disabled], select[disabled], textarea[disabled] {
    background: var(--disabled-bg);
    color: var(--muted);
  }
  button {
    padding: 8px 14px;
    border: 0;
    border-radius: 6px;
    background: var(--primary);
    color: #fff;
    cursor: pointer;
  }
  button:hover { background: var(--primary-hover); }
  button.secondary {
    background: #fff;
    color: var(--text);
    border: 1px solid var(--border);
  }
  button:disabled { opacity: .55; cursor: not-allowed; }
  .msg { padding: 8px 10px; border-radius: 6px; margin-top: 12px; font-size: 13px; }
  .msg.err { background: #fdecec; color: var(--danger); border: 1px solid #f5c8c5; }
  .msg.ok  { background: #eaf6ee; color: var(--ok);     border: 1px solid #c6e3d1; }
  ul.results { list-style: none; padding: 0; margin: 12px 0 0; }
  ul.results li {
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 6px;
    cursor: pointer;
    background: #fff;
  }
  ul.results li:hover { background: #f0f4ff; }
  ul.results li .id { color: var(--muted); margin-right: 8px; font-size: 12px; }
  ul.results li .cat { color: var(--muted); font-size: 12px; margin-left: 8px; }
  .note {
    font-size: 12px; color: var(--muted); margin-top: 4px;
  }
  .actions { margin-top: 14px; display: flex; gap: 8px; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<header>
  <h1>PawGo Admin — pet policy editor</h1>
  <span class="who" id="who"></span>
</header>

<main>
  <!-- LOGIN -->
  <section id="loginCard" class="card">
    <h2>로그인</h2>
    <div class="row">
      <label for="loginEmail">이메일</label>
      <input id="loginEmail" type="email" value="shinis0207@gmail.com" autocomplete="username" />
    </div>
    <div class="row">
      <label for="loginPw">비밀번호</label>
      <input id="loginPw" type="password" autocomplete="current-password" />
    </div>
    <div class="actions">
      <button id="loginBtn">로그인</button>
    </div>
    <div id="loginMsg"></div>
  </section>

  <!-- SEARCH -->
  <section id="searchCard" class="card hidden">
    <h2>장소 검색</h2>
    <p class="note">
      서울 중심 좌표(37.5665, 126.978) 반경 50km 안에서 이름 검색.
      include_unverified=true로 전 상태의 장소를 노출. 전국 커버는 아직 아님.
    </p>
    <div class="row">
      <label for="searchQ">이름</label>
      <input id="searchQ" type="text" placeholder="예: 커피 리브레" />
    </div>
    <div class="actions">
      <button id="searchBtn">검색</button>
      <button class="secondary" id="logoutBtn">로그아웃</button>
    </div>
    <ul class="results" id="results"></ul>
    <div id="searchMsg"></div>
  </section>

  <!-- EDIT -->
  <section id="editCard" class="card hidden">
    <h2>정책 편집 — <span id="placeName"></span> <span class="note" id="placeMeta"></span></h2>

    <div class="row">
      <label>verification_status</label>
      <input id="v_verification" disabled />
    </div>
    <p class="note">verification_status는 trust engine이 자동으로 계산합니다. 편집 불가.</p>

    <hr />

    <div class="row">
      <label for="v_pet_allowed_status">pet_allowed_status</label>
      <select id="v_pet_allowed_status">
        <option value="">미설정</option>
        <option value="allowed">allowed</option>
        <option value="limited">limited</option>
        <option value="not_allowed">not_allowed</option>
        <option value="unknown">unknown</option>
      </select>
    </div>

    <div class="row">
      <label for="v_indoor_allowed">indoor_allowed</label>
      <select id="v_indoor_allowed" class="tri">
        <option value="">미설정</option>
        <option value="true">true</option>
        <option value="false">false</option>
      </select>
    </div>

    <div class="row">
      <label for="v_outdoor_allowed">outdoor_allowed</label>
      <select id="v_outdoor_allowed" class="tri">
        <option value="">미설정</option>
        <option value="true">true</option>
        <option value="false">false</option>
      </select>
    </div>

    <div class="row">
      <label for="v_dog_allowed">dog_allowed</label>
      <select id="v_dog_allowed" class="tri">
        <option value="">미설정</option>
        <option value="true">true</option>
        <option value="false">false</option>
      </select>
    </div>

    <div class="row">
      <label for="v_cat_allowed">cat_allowed</label>
      <select id="v_cat_allowed" class="tri">
        <option value="">미설정</option>
        <option value="true">true</option>
        <option value="false">false</option>
      </select>
    </div>

    <div class="row">
      <label for="v_max_weight_kg">max_weight_kg</label>
      <input id="v_max_weight_kg" type="number" step="0.1" min="0" placeholder="비우면 미설정" />
    </div>

    <div class="row">
      <label for="v_leash_required">leash_required</label>
      <select id="v_leash_required" class="tri">
        <option value="">미설정</option>
        <option value="true">true</option>
        <option value="false">false</option>
      </select>
    </div>

    <div class="row">
      <label for="v_carrier_required">carrier_required</label>
      <select id="v_carrier_required" class="tri">
        <option value="">미설정</option>
        <option value="true">true</option>
        <option value="false">false</option>
      </select>
    </div>

    <div class="row">
      <label for="v_vaccination_required">vaccination_required</label>
      <select id="v_vaccination_required" class="tri">
        <option value="">미설정</option>
        <option value="true">true</option>
        <option value="false">false</option>
      </select>
    </div>

    <div class="row">
      <label for="v_notes">notes</label>
      <textarea id="v_notes" placeholder="비우면 미설정"></textarea>
    </div>

    <div class="row">
      <label for="v_policy_source">policy_source</label>
      <select id="v_policy_source">
        <option value="">미설정</option>
        <option value="mfds">mfds</option>
        <option value="owner">owner</option>
        <option value="admin">admin</option>
        <option value="user_report">user_report</option>
        <option value="external">external</option>
        <option value="unknown">unknown</option>
      </select>
    </div>

    <div class="row">
      <label for="v_confidence_score">confidence_score</label>
      <input id="v_confidence_score" type="number" step="0.01" min="0" max="1" placeholder="0.0 ~ 1.0, 비우면 미설정" />
    </div>

    <div class="actions">
      <button id="saveBtn">저장</button>
      <button class="secondary" id="reloadBtn">현재값 다시 불러오기</button>
    </div>
    <div id="editMsg"></div>
  </section>
</main>

<script>
"use strict";

const API = "/api/v1";

// --- Editable fields (must mirror PetPolicyPatchRequest / _ALLOWED_POLICY_FIELDS) ---
const TRI_FIELDS = [
  "indoor_allowed", "outdoor_allowed", "dog_allowed", "cat_allowed",
  "leash_required", "carrier_required", "vaccination_required",
];
const ENUM_FIELDS = ["pet_allowed_status", "policy_source"];
const NUMBER_FIELDS = ["max_weight_kg", "confidence_score"];
const TEXT_FIELDS = ["notes"];
const ALL_EDITABLE = [
  ...ENUM_FIELDS, ...TRI_FIELDS, ...NUMBER_FIELDS, ...TEXT_FIELDS,
];

// --- State ---
let token = localStorage.getItem("pawgo_admin_token") || "";
let currentPlace = null;   // { id, name, category }
let loadedPolicy = null;   // baseline for diff on save

// --- DOM helpers ---
const $ = (id) => document.getElementById(id);
function show(el) { el.classList.remove("hidden"); }
function hide(el) { el.classList.add("hidden"); }
function setMsg(el, text, kind) {
  el.innerHTML = text ? `<div class="msg ${kind}">${escapeHtml(text)}</div>` : "";
}
function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g,
    c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

async function api(path, opts = {}) {
  const headers = Object.assign(
    { "Content-Type": "application/json" },
    opts.headers || {},
  );
  if (token) headers["Authorization"] = "Bearer " + token;
  const res = await fetch(API + path, Object.assign({}, opts, { headers }));
  let body = null;
  try { body = await res.json(); } catch { /* non-JSON response ok */ }
  return { ok: res.ok, status: res.status, body };
}

// --- Auth ---
async function login() {
  const email = $("loginEmail").value.trim();
  const password = $("loginPw").value;
  setMsg($("loginMsg"), "", "");
  const r = await api("/auth/login", {
    method: "POST",
    body: JSON.stringify({ email, password }),
  });
  if (!r.ok) {
    setMsg($("loginMsg"),
      "로그인 실패 (" + r.status + "): " + JSON.stringify(r.body?.detail ?? r.body ?? ""),
      "err");
    return;
  }
  if (r.body?.user?.role !== "admin") {
    setMsg($("loginMsg"), "이 계정은 admin 권한이 없습니다.", "err");
    return;
  }
  token = r.body.access_token;
  localStorage.setItem("pawgo_admin_token", token);
  enterAdmin(r.body.user);
}

function enterAdmin(user) {
  $("who").textContent = (user?.email || "") + " · admin";
  hide($("loginCard"));
  show($("searchCard"));
}

function logout() {
  token = "";
  localStorage.removeItem("pawgo_admin_token");
  location.reload();
}

async function bootstrapFromToken() {
  if (!token) return;
  const r = await api("/auth/me");
  if (r.ok && r.body?.role === "admin") {
    enterAdmin(r.body);
  } else {
    logout();
  }
}

// --- Search ---
async function search() {
  const q = $("searchQ").value.trim();
  if (!q) return;
  setMsg($("searchMsg"), "검색 중…", "ok");
  $("results").innerHTML = "";
  // Seoul-city-hall coords + 50km radius; include_unverified=true so we see
  // every place regardless of trust band. Deliberately no cross-country
  // search yet — this screen ships as the Seoul-scoped MVP.
  const params = new URLSearchParams({
    lat: "37.5665", lng: "126.978",
    radius_km: "50", size: "50", page: "1",
    q, include_unverified: "true", lang: "ko",
  });
  const r = await api("/places/nearby?" + params.toString());
  if (!r.ok) {
    setMsg($("searchMsg"),
      "검색 실패 (" + r.status + "): " + JSON.stringify(r.body?.detail ?? r.body ?? ""),
      "err");
    return;
  }
  const items = r.body?.items || [];
  setMsg($("searchMsg"), items.length ? "" : "결과 없음", items.length ? "ok" : "err");
  const ul = $("results");
  ul.innerHTML = "";
  items.forEach((p) => {
    const li = document.createElement("li");
    li.innerHTML =
      '<span class="id">#' + p.id + '</span>' +
      '<strong>' + escapeHtml(p.name) + '</strong>' +
      '<span class="cat">' + escapeHtml(p.category) + '</span>';
    li.onclick = () => selectPlace(p);
    ul.appendChild(li);
  });
}

// --- Selection + load policy ---
async function selectPlace(p) {
  currentPlace = { id: p.id, name: p.name, category: p.category };
  await loadPolicy();
}

async function loadPolicy() {
  if (!currentPlace) return;
  setMsg($("editMsg"), "불러오는 중…", "ok");
  const r = await api("/places/" + currentPlace.id + "?lang=ko");
  if (!r.ok) {
    setMsg($("editMsg"),
      "장소 조회 실패 (" + r.status + "): " + JSON.stringify(r.body?.detail ?? r.body ?? ""),
      "err");
    return;
  }
  const policy = r.body?.pet_policy || {};
  loadedPolicy = policy;
  $("placeName").textContent = currentPlace.name;
  $("placeMeta").textContent =
    " (#" + currentPlace.id + ", " + currentPlace.category + ")";
  $("v_verification").value = policy.verification_status ?? "";
  ENUM_FIELDS.forEach((f) => { $("v_" + f).value = policy[f] ?? ""; });
  TRI_FIELDS.forEach((f) => {
    const v = policy[f];
    $("v_" + f).value = v === true ? "true" : v === false ? "false" : "";
  });
  NUMBER_FIELDS.forEach((f) => {
    $("v_" + f).value = policy[f] === null || policy[f] === undefined
      ? "" : String(policy[f]);
  });
  TEXT_FIELDS.forEach((f) => { $("v_" + f).value = policy[f] ?? ""; });
  show($("editCard"));
  setMsg($("editMsg"), "", "");
}

// --- Value readers (form value → JSON value) ---
function readTri(id) {
  const v = $(id).value;
  if (v === "true") return true;
  if (v === "false") return false;
  return null;
}
function readEnum(id) {
  const v = $(id).value;
  return v === "" ? null : v;
}
function readNumber(id) {
  const v = $(id).value.trim();
  if (v === "") return null;
  const n = Number(v);
  return Number.isFinite(n) ? n : null;
}
function readText(id) {
  const v = $(id).value;
  return v === "" ? null : v;
}

// --- Save (diff → PATCH) ---
async function save() {
  if (!currentPlace || !loadedPolicy) return;
  const current = {};
  ENUM_FIELDS.forEach((f) => { current[f] = readEnum("v_" + f); });
  TRI_FIELDS.forEach((f) => { current[f] = readTri("v_" + f); });
  NUMBER_FIELDS.forEach((f) => { current[f] = readNumber("v_" + f); });
  TEXT_FIELDS.forEach((f) => { current[f] = readText("v_" + f); });

  const patch = {};
  ALL_EDITABLE.forEach((f) => {
    const before = loadedPolicy[f] ?? null;
    const after = current[f];
    if (before !== after) patch[f] = after;
  });

  if (Object.keys(patch).length === 0) {
    setMsg($("editMsg"), "변경된 필드 없음.", "ok");
    return;
  }

  setMsg($("editMsg"), "저장 중…", "ok");
  const r = await api("/admin/places/" + currentPlace.id + "/policy", {
    method: "PATCH",
    body: JSON.stringify(patch),
  });
  if (!r.ok) {
    setMsg($("editMsg"),
      "저장 실패 (" + r.status + "): " + JSON.stringify(r.body?.detail ?? r.body ?? ""),
      "err");
    return;
  }
  // Response is the fresh PetPolicyResponse — use it as new baseline.
  loadedPolicy = r.body;
  // Re-render fields from the authoritative response so the UI reflects
  // trust-engine-computed verification_status changes too.
  $("v_verification").value = loadedPolicy.verification_status ?? "";
  ENUM_FIELDS.forEach((f) => { $("v_" + f).value = loadedPolicy[f] ?? ""; });
  TRI_FIELDS.forEach((f) => {
    const v = loadedPolicy[f];
    $("v_" + f).value = v === true ? "true" : v === false ? "false" : "";
  });
  NUMBER_FIELDS.forEach((f) => {
    $("v_" + f).value = loadedPolicy[f] === null || loadedPolicy[f] === undefined
      ? "" : String(loadedPolicy[f]);
  });
  TEXT_FIELDS.forEach((f) => { $("v_" + f).value = loadedPolicy[f] ?? ""; });
  setMsg($("editMsg"),
    "저장됨 (변경 " + Object.keys(patch).length + "개 필드).",
    "ok");
}

// --- Wire up ---
$("loginBtn").addEventListener("click", login);
$("logoutBtn").addEventListener("click", logout);
$("searchBtn").addEventListener("click", search);
$("searchQ").addEventListener("keydown",
  (e) => { if (e.key === "Enter") search(); });
$("saveBtn").addEventListener("click", save);
$("reloadBtn").addEventListener("click", loadPolicy);

bootstrapFromToken();
</script>
</body>
</html>
